name: formal-checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trace-and-tla:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run replication trace drift checks
        run: make test-tla-trace

      - name: Install Java (for TLC)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Run bounded TLC checks (required)
        shell: bash
        run: |
          set -euo pipefail
          if command -v tlc >/dev/null 2>&1; then
            make test-tla
            exit 0
          fi
          if [[ ! -f ./tools/tla2tools.jar ]]; then
            mkdir -p ./tools
            curl -fsSL \
              https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar \
              -o ./tools/tla2tools.jar
          fi
          if [[ -f ./tools/tla2tools.jar ]]; then
            env TLA2TOOLS_JAR=./tools/tla2tools.jar make test-tla
          else
            echo "::error::TLC unavailable and tla2tools.jar could not be downloaded."
            exit 1
          fi

  kani:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Pinned kani-verifier version. Bumping this single env var
    # (here AND in the cache key below) is the only change needed
    # to roll forward; the install step honours it and the cache
    # key invalidates automatically.
    #
    # Why pin: each Kani release ships a different CBMC payload
    # downloaded by `cargo-kani setup`. Without a pin, a stale
    # `~/.kani` layout from cache + a freshly-installed newer
    # `cargo-kani` binary could mismatch silently; with a pin, the
    # cache key encodes the version and the two stay in lock-step.
    env:
      KANI_VERSION: "0.67.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Caches ~/.cargo/registry, ~/.cargo/git and ./target so the
      # `cargo install --locked kani-verifier` step plus the per-crate
      # `cargo kani` invocations skip the full Rust build on warm runs.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # Caches the Kani toolchain itself (CBMC + symex binaries +
      # ~/.kani layout). Cold install of kani-verifier from crates.io
      # plus `cargo-kani setup` (which downloads a ~140 MB CBMC
      # tarball) takes ~5-10 min on a 4-vCPU GHA runner; a cache hit
      # is ~30 s.
      #
      # IMPORTANT: we split the cache into separate `restore` and
      # `save` steps so the cache is written **even when the job
      # fails** (`save` runs with `if: always()`). With the default
      # combined `actions/cache@v4`, the cache is only persisted on
      # job success — so a single failing proof or a timed-out step
      # would force every retry to pay the full cold install cost
      # again. With save-on-failure, the second iteration on the
      # same `KANI_VERSION` hits the cache regardless of whether the
      # previous run passed.
      - name: Restore Kani toolchain cache
        id: kani-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: kani-toolchain-${{ runner.os }}-v${{ env.KANI_VERSION }}
          restore-keys: |
            kani-toolchain-${{ runner.os }}-v

      # We install Kani directly instead of via
      # `model-checking/kani-github-action@v1.1` because that composite
      # action's last step runs `cargo-kani` at the workspace root with
      # no `-p` flag, which on this multi-crate workspace tries to
      # verify every member and hangs (cancelled at ~9-10 min, well
      # before our 15-min step budget). Direct install + explicit
      # `-p kcore-sanitize` below gives predictable timing.
      #
      # No protobuf compiler is needed: `kcore-sanitize` is a leaf
      # crate with zero non-std dependencies.
      #
      # `cargo-kani setup` is only run when the cache did not already
      # restore `~/.kani`, since `setup` re-downloads the CBMC + Kyanite
      # payload (~1 min) every time it runs even when the layout is
      # already in place.
      - name: Install kani-verifier
        id: kani-install
        timeout-minutes: 15
        run: |
          set -euo pipefail
          if ! command -v cargo-kani >/dev/null 2>&1; then
            cargo install --locked kani-verifier --version "${KANI_VERSION}"
          else
            installed="$(cargo-kani --version 2>/dev/null | awk '{print $NF}')"
            if [ "${installed}" != "${KANI_VERSION}" ]; then
              echo "Cached cargo-kani is ${installed}, want ${KANI_VERSION}; reinstalling."
              cargo install --locked --force kani-verifier --version "${KANI_VERSION}"
            else
              echo "Cached cargo-kani matches pin (${installed})."
            fi
          fi
          if [ ! -d "$HOME/.kani" ] || [ -z "$(ls -A "$HOME/.kani" 2>/dev/null)" ]; then
            cargo-kani setup
          else
            echo "kani toolchain restored from cache, skipping cargo-kani setup"
          fi

      # Save the Kani toolchain cache **immediately after install**,
      # before the proof step (which can fail, time out, OOM, or be
      # cancelled by the user). This is the only reliable way to
      # warm the cache for subsequent runs:
      #
      #   - GitHub Actions does NOT execute steps after a job-level
      #     cancellation, even those guarded with `if: always()`.
      #     A trailing "save on always" step is therefore useless
      #     when the user clicks Cancel or when the runner OOM-
      #     kills the job (both of which we have hit on this PR).
      #
      #   - Saving here means: the moment kani-verifier is installed
      #     and ~/.kani is populated, the cache is uploaded. Any
      #     future run on the same `KANI_VERSION` skips install
      #     entirely (~30 s instead of ~5-10 min), regardless of
      #     whether earlier attempts at the proof step succeeded,
      #     failed, or were cancelled.
      #
      # Skipped when we already restored a cache hit (the same key
      # is already present, and `actions/cache/save` would otherwise
      # log an error trying to overwrite it).
      - name: Save Kani toolchain cache (post-install)
        if: steps.kani-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: ${{ steps.kani-cache.outputs.cache-primary-key }}

      # All proofs live in `kcore-sanitize`, a leaf crate with **no
      # non-std dependencies**, so Kani only has to compile that one
      # crate (a few seconds) instead of the full controller dep
      # graph (rusqlite-bundled SQLite, rcgen+aws-lc-rs, tonic, ...
      # which takes >20 min on a 4-vCPU GHA runner).
      #
      # The 11 #[kani::proof] harnesses in `crates/kcore-sanitize/
      # src/lib.rs` are independent. We deliberately run with
      # `--jobs 2` (NOT `$(nproc)`):
      #
      #   - `ubuntu-latest` is 4 vCPU / 16 GB. Each CBMC instance
      #     can peak at multiple GB during SAT solving on the
      #     larger harnesses, so 4 parallel CBMC processes have
      #     repeatedly exceeded the runner's memory budget on this
      #     PR, leading to job-level OOM cancellation that GHA
      #     reports as "The operation was canceled."
      #
      #   - `--jobs 2` keeps peak memory comfortably under the 16
      #     GB ceiling. Wall-clock for 11 harnesses is ~5-6 min
      #     instead of ~3 min, which is fine: the step has a
      #     25-min timeout.
      #
      # Two argv requirements that bit earlier attempts:
      #   1. `--jobs` was stabilised in kani-verifier 0.63 (we pin
      #      0.67.0), so it does NOT need `-Z unstable-options`.
      #   2. `--jobs N` with N>1 is rejected at argument validation
      #      unless `--output-format=terse` is also supplied. See
      #      kani-driver/src/args/mod.rs::VerificationArgs::validate
      #      in kani-0.67.0.
      - name: Run bounded Kani proofs
        timeout-minutes: 25
        run: |
          set -euo pipefail
          cargo-kani --version
          cargo kani -p kcore-sanitize \
            --jobs 2 \
            --output-format terse
